<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Models Gallery</title>
    <!-- Tailwind CSS לעיצוב סופר מהיר ומודרני -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- אייקונים -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* אנימציית טעינה ייעודית */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* עיצוב פס הגלילה */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- אזור ראשי (הגלריה) -->
    <main class="flex-grow p-4 md:p-8 overflow-y-auto pb-32" id="main-content">
        <div class="max-w-7xl mx-auto text-center mt-10" id="welcome-screen">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                מעבדת המודלים של AI
            </h1>
            <p class="text-gray-400 text-lg mb-8">
                הזן פרומפט (תיאור) למטה, וראה כיצד מודלים שונים של בינה מלאכותית מפרשים אותו.
                <br><span class="text-sm">(מומלץ לכתוב באנגלית לתוצאות הטובות ביותר, אך המערכת תומכת גם בעברית)</span>
            </p>
            
            <div class="flex justify-center gap-4 flex-wrap text-sm text-gray-500">
                <span class="bg-gray-800 px-3 py-1 rounded-full border border-gray-700">Flux Schnell</span>
                <span class="bg-gray-800 px-3 py-1 rounded-full border border-gray-700">Imagen 4</span>
                <span class="bg-gray-800 px-3 py-1 rounded-full border border-gray-700">FLUX.2 Dev</span>
                <span class="bg-gray-800 px-3 py-1 rounded-full border border-gray-700">GPT Image</span>
            </div>
        </div>

        <!-- קונטיינר לגלריית התמונות -->
        <div id="gallery" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden mt-8">
            <!-- התמונות יוזרקו לכאן על ידי JavaScript -->
        </div>
    </main>

    <!-- אזור הקלט (בתחתית המסך, כמו ב-ChatGPT) -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-900 bg-opacity-95 border-t border-gray-800 p-4 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto">
            <form id="prompt-form" class="relative">
                <input 
                    type="text" 
                    id="prompt-input" 
                    placeholder="תאר את התמונה שתרצה ליצור... (לדוגמה: A futuristic city in a glass globe)" 
                    class="w-full bg-gray-800 border border-gray-700 text-white rounded-2xl py-4 pr-6 pl-16 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-lg text-lg"
                    required
                >
                <button 
                    type="submit" 
                    id="submit-btn"
                    class="absolute left-3 top-1/2 transform -translate-y-1/2 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl transition-colors flex items-center justify-center"
                    title="צור תמונות"
                >
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </button>
            </form>
            <div class="text-center mt-2 text-xs text-gray-500">
                מופעל על ידי טכנולוגיית Pollinations.ai
            </div>
        </div>
    </div>

    <script>
        // אתחול האייקונים של Lucide
        lucide.createIcons();

        // רשימת המודלים שברצוננו לבדוק (מבוסס על הרשימה שלך)
        const MODELS = [
            { id: 'flux', name: 'Flux Schnell' },
            { id: 'flux-2-dev', name: 'FLUX.2 Dev (Alpha)' },
            { id: 'zimage', name: 'Z-Image Turbo' },
            { id: 'imagen-4', name: 'Google Imagen 4' },
            { id: 'klein', name: 'FLUX.2 Klein 4B' },
            { id: 'gptimage', name: 'GPT Image 1 Mini' }
        ];

        const form = document.getElementById('prompt-form');
        const input = document.getElementById('prompt-input');
        const gallery = document.getElementById('gallery');
        const welcomeScreen = document.getElementById('welcome-screen');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const prompt = input.value.trim();
            if (!prompt) return;

            generateImages(prompt);
        });

        function generateImages(prompt) {
            // העלמת מסך הפתיחה והצגת הגלריה
            welcomeScreen.classList.add('hidden');
            gallery.classList.remove('hidden');
            gallery.innerHTML = ''; // ניקוי תמונות קודמות

            // החלפת אייקון כפתור לשעון חול
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
            lucide.createIcons();
            submitBtn.disabled = true;

            // יצירת זרע (seed) אקראי כדי שכל המודלים יקבלו את אותו הזרע להשוואה הוגנת, או זרע חדש לכל יצירה
            const seed = Math.floor(Math.random() * 100000);
            let loadedImages = 0;

            MODELS.forEach(model => {
                // יצירת הכרטיסייה לכל מודל
                const card = document.createElement('div');
                card.className = 'bg-gray-800 rounded-2xl overflow-hidden border border-gray-700 shadow-xl relative group aspect-square flex flex-col items-center justify-center';
                
                // ספינר טעינה
                const loaderContainer = document.createElement('div');
                loaderContainer.className = 'absolute inset-0 flex flex-col items-center justify-center z-10';
                loaderContainer.innerHTML = `
                    <div class="loader mb-4"></div>
                    <p class="text-blue-400 font-medium">מייצר ב-${model.name}...</p>
                `;
                card.appendChild(loaderContainer);

                // אלמנט התמונה
                const img = document.createElement('img');
                img.className = 'w-full h-full object-cover opacity-0 transition-opacity duration-500 z-20 relative';
                img.alt = `Generated by ${model.name}`;
                
                // הרכבת כתובת ה-URL של Pollinations
                // אנחנו מקודדים את הפרומפט כדי שיתאים ל-URL (תומך גם בעברית)
                const encodedPrompt = encodeURIComponent(prompt);
                const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=${model.id}&width=1024&height=1024&nologo=true&seed=${seed}`;
                
                img.src = imageUrl;

                // אירוע סיום טעינת התמונה
                img.onload = () => {
                    loaderContainer.style.display = 'none'; // הסתרת הספינר
                    img.classList.remove('opacity-0'); // הצגת התמונה באנימציה רכה
                    checkAllLoaded();
                };

                // אירוע שגיאה
                img.onerror = () => {
                    loaderContainer.innerHTML = `
                        <i data-lucide="alert-triangle" class="w-10 h-10 text-red-500 mb-2"></i>
                        <p class="text-red-400 font-medium">שגיאה בטעינת ${model.name}</p>
                    `;
                    lucide.createIcons();
                    checkAllLoaded();
                };

                // תווית שם המודל על גבי התמונה
                const badge = document.createElement('div');
                badge.className = 'absolute top-3 right-3 bg-black bg-opacity-70 text-white px-3 py-1 rounded-lg text-sm font-medium z-30 backdrop-blur-md border border-gray-600';
                badge.innerText = model.name;

                card.appendChild(img);
                card.appendChild(badge);
                gallery.appendChild(card);
            });

            // פונקציה לבדיקה אם כל התמונות סיימו לטעון
            function checkAllLoaded() {
                loadedImages++;
                if (loadedImages === MODELS.length) {
                    // החזרת הכפתור למצב רגיל
                    submitBtn.innerHTML = '<i data-lucide="sparkles" class="w-5 h-5"></i>';
                    lucide.createIcons();
                    submitBtn.disabled = false;
                    
                    // גלילה קלה למעלה כדי לראות את התוצאות
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        }
    </script>
</body>
</html>
